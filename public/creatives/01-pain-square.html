<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Ad Creative — Pain Point</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #050505;
    color: #f5f5f5;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .glow {
    position: absolute;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse at center, rgba(196,98,45,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .glow-bottom {
    position: absolute;
    bottom: -5%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse at center, rgba(196,98,45,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 80px 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(196,98,45,0.1);
    border: 1px solid rgba(196,98,45,0.25);
    border-radius: 100px;
    padding: 8px 20px;
    margin-bottom: 48px;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    background: #c4622d;
    border-radius: 50%;
  }

  .badge-text {
    font-size: 16px;
    color: #c4622d;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 72px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin-bottom: 32px;
    background: linear-gradient(to bottom, #ffffff, #ffffff, rgba(255,255,255,0.6));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1 em {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    background: linear-gradient(to bottom, #c4622d, rgba(196,98,45,0.7));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-size: 22px;
    color: #777;
    line-height: 1.6;
    max-width: 700px;
    margin-bottom: 48px;
  }

  .stat-row {
    display: flex;
    gap: 48px;
    margin-bottom: 56px;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: #c4622d;
    line-height: 1;
  }

  .stat-label {
    font-size: 14px;
    color: #555;
    margin-top: 8px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #c4622d;
    color: white;
    border-radius: 100px;
    padding: 18px 40px;
    font-size: 18px;
    font-weight: 600;
    box-shadow: 0 4px 24px rgba(196,98,45,0.35);
  }

  .cta svg {
    width: 18px;
    height: 18px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow-bottom"></div>
  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Live in 5–7 days</span>
    </div>

    <h1>You're paying for traffic that<br><em>never converts</em></h1>

    <p class="sub">
      70% of your carts are abandoned. Your email flows are either broken or missing. You're bleeding revenue every single day.
    </p>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-value">70%</div>
        <div class="stat-label">Carts abandoned</div>
      </div>
      <div class="stat">
        <div class="stat-value">$0</div>
        <div class="stat-label">Recovered without flows</div>
      </div>
    </div>

    <div class="cta">
      Fix It for $360
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </div>
</body>
</html>
